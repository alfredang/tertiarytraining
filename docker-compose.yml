services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tertiary_training
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/tertiary_training?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me}
      SEED_TOKEN: ${SEED_TOKEN:-change-me-seed}
      DOCKER_HOST_MODE: ${DOCKER_HOST_MODE:-mock}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_NAME: Tertiary Training
    ports:
      - "3000:3000"

volumes:
  db_data:
